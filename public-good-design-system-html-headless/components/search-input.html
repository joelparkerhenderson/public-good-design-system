<!-- SearchInput component -->
<!--
  Description: an input for entering a search query
  HTML tag: <input>
  CSS class: search-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: role="searchbox", Implicit input role, aria-label for accessible name
  Usage:
    <input class="search-input" role="searchbox" aria-label="Example">
      ...
    
-->

<input
  class="search-input"
  role="searchbox"
  type="search"
  aria-label=""
>
