<!-- vital-sign-height-as-cm-view.html -->
<!-- VitalSignHeightAsCmView component -->
<!--
  Description: number display of one vital sign height in centimetres with integers
  HTML tag: <span>
  CSS class: vital-sign-height-as-cm-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <span class="vital-sign-height-as-cm-view" aria-label="Example">
      ...
    </span>
-->

<span
  class="vital-sign-height-as-cm-view"
  role="img"
  aria-label="Height"
  data-value=""
>
  <!-- Display: shows the vital sign value as text content -->
  <!-- Consumer sets data-value attribute and text content -->
</span>
