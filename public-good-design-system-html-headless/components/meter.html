<!-- meter.html -->
<!-- Meter component -->
<!--
  Description: a gauge displaying a scalar value within a known range
  HTML tag: <meter>
  CSS class: meter
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <meter class="meter" aria-label="Example">
      ...
    </meter>
-->

<meter
  class="meter"
  aria-label=""
  min="0"
  max="100"
  value="0"
>
  <!-- Consumer provides fallback text -->
</meter>
