<!-- Carousel component -->
<!--
  Description: a slideshow for cycling through content items
  HTML tag: <div>
  CSS class: carousel
  Keyboard: Tab to focus controls, Arrow Left/Right to navigate slides
  Accessibility: role="region", aria-label for accessible name
  Usage:
    <div class="carousel" role="region" aria-label="Example">
      ...
    </div>
-->

<div
  class="carousel"
  role="region"
  aria-label=""
  aria-roledescription="carousel"
>
  <!-- Consumer provides content -->
</div>

<script>
  // Carousel behavior
  (function() {
    'use strict';
    // Carousel: consumer implements interactive behavior
    document.querySelectorAll('.carousel').forEach(function(el) {
      // Interactive behavior initialization
    });
  })();
</script>
