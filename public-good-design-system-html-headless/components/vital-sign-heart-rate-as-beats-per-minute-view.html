<!-- VitalSignHeartRateAsBeatsPerMinuteView component -->
<!--
  Description: number display of one vital sign heart rate in beats per minute with integers
  HTML tag: <span>
  CSS class: vital-sign-heart-rate-as-beats-per-minute-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <span class="vital-sign-heart-rate-as-beats-per-minute-view" aria-label="Example">
      ...
    </span>
-->

<span
  class="vital-sign-heart-rate-as-beats-per-minute-view"
  role="img"
  aria-label="Heart Rate"
  data-value=""
>
  <!-- Display: shows the vital sign value as text content -->
  <!-- Consumer sets data-value attribute and text content -->
</span>
