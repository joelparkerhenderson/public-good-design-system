<!-- VitalSignSleepScoreAs0To100Input component -->
<!--
  Description: number input of one vital sign sleep score with range 0-100
  HTML tag: <input>
  CSS class: vital-sign-sleep-score-as-0-to-100-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Usage:
    <input class="vital-sign-sleep-score-as-0-to-100-input" aria-label="Example">
      ...
    
-->

<input
  class="vital-sign-sleep-score-as-0-to-100-input"
  type="number"
  min="0"
  max="100"
  step="1"
  aria-label="Sleep Score"
>
