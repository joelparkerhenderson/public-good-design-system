<!-- VitalSignBloodPressureSystolicAsMmhgView component -->
<!--
  Description: number display of one vital sign blood pressure systolic with integers
  HTML tag: <span>
  CSS class: vital-sign-blood-pressure-systolic-as-mmhg-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <span class="vital-sign-blood-pressure-systolic-as-mmhg-view" aria-label="Example">
      ...
    </span>
-->

<span
  class="vital-sign-blood-pressure-systolic-as-mmhg-view"
  role="img"
  aria-label="Blood Pressure Systolic"
  data-value=""
>
  <!-- Display: shows the vital sign value as text content -->
  <!-- Consumer sets data-value attribute and text content -->
</span>
