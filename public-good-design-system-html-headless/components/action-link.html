<!-- ActionLink component -->
<!--
  Description: a hyperlink styled as an action trigger
  HTML tag: <a>
  CSS class: action-link
  Keyboard: Tab to focus, Enter to follow link
  Accessibility: aria-label for accessible name
  Usage:
    <a class="action-link" aria-label="Example">
      ...
    </a>
-->

<a
  class="action-link"
  aria-label=""
  href=""
>
  <!-- Consumer provides link text -->
</a>
