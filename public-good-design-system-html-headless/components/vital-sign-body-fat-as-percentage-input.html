<!-- VitalSignBodyFatAsPercentageInput component -->
<!--
  Description: number input of one vital sign body fat percentage with one decimal point
  HTML tag: <input>
  CSS class: vital-sign-body-fat-as-percentage-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Usage:
    <input class="vital-sign-body-fat-as-percentage-input" aria-label="Example">
      ...
    
-->

<input
  class="vital-sign-body-fat-as-percentage-input"
  type="number"
  min="0"
  max="100"
  step="0.1"
  aria-label="Body Fat Percentage"
>
