<!-- listbox.html -->
<!-- Listbox component -->
<!--
  Description: a list of selectable options with keyboard navigation
  HTML tag: <div>
  CSS class: listbox
  Keyboard: Tab to focus, Arrow Up/Down to navigate, Enter to select
  Accessibility: role="listbox", aria-label for accessible name
  Usage:
    <div class="listbox" role="listbox" aria-label="Example">
      ...
    </div>
-->

<div
  class="listbox"
  role="listbox"
  aria-label=""
>
  <!-- Consumer provides content -->
</div>

<script>
  // Listbox behavior
  (function() {
    'use strict';
    // Listbox: consumer implements interactive behavior
    document.querySelectorAll('.listbox').forEach(function(el) {
      // Interactive behavior initialization
    });
  })();
</script>
