<!-- Figure component -->
<!--
  Description: a self-contained figure with optional caption
  HTML tag: <figure>
  CSS class: figure
  Keyboard: None (passive element)

  Usage:
    <figure class="figure" aria-label="Example">
      ...
    </figure>
-->

  class="figure"
  aria-label=""
>
  <!-- Consumer provides figure content and optional caption -->
</figure>
