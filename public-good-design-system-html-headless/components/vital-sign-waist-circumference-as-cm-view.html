<!-- VitalSignWaistCircumferenceAsCmView component -->
<!--
  Description: number display of one vital sign waist circumference in centimetres with integers
  HTML tag: <span>
  CSS class: vital-sign-waist-circumference-as-cm-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <span class="vital-sign-waist-circumference-as-cm-view" aria-label="Example">
      ...
    </span>
-->

<span
  class="vital-sign-waist-circumference-as-cm-view"
  role="img"
  aria-label="Waist Circumference"
  data-value=""
>
  <!-- Display: shows the vital sign value as text content -->
  <!-- Consumer sets data-value attribute and text content -->
</span>
