<!-- kbd.html -->
<!-- Kbd component -->
<!--
  Description: show keyboard shortcuts and key combinations in a styled inline element
  HTML tag: <kbd>
  CSS class: kbd
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <kbd class="kbd" aria-label="Example">
      ...
    </kbd>
-->

<kbd
  class="kbd"
>
  <!-- Consumer provides key text -->
</kbd>
