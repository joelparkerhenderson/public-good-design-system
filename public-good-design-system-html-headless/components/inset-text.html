<!-- InsetText component -->
<!--
  Description: indented text to distinguish it from surrounding content
  HTML tag: <div>
  CSS class: inset-text
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <div class="inset-text" aria-label="Example">
      ...
    </div>
-->

<div
  class="inset-text"
  aria-label=""
>
  <!-- Consumer provides content -->
</div>
