<!-- tab-bar-button.html -->
<!-- TabBarButton component -->
<!--
  Description: one tab button in a tab group
  HTML tag: <button>
  CSS class: tab-bar-button
  Keyboard: Tab to focus, Enter or Space to activate
  Accessibility: role="tab", Implicit button role, aria-label for accessible name
  Usage:
    <button class="tab-bar-button" role="tab" aria-label="Example">
      ...
    </button>
-->

<button
  class="tab-bar-button"
  role="tab"
  aria-label=""
  aria-selected="false"
  tabindex="-1"
>
  <!-- Consumer provides button content -->
</button>
