<!-- vital-sign-heart-rate-variability-view.html -->
<!-- VitalSignHeartRateVariabilityView component -->
<!--
  Description: number display of one vital sign heart rate variability with integers
  HTML tag: <span>
  CSS class: vital-sign-heart-rate-variability-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <span class="vital-sign-heart-rate-variability-view" aria-label="Example">
      ...
    </span>
-->

<span
  class="vital-sign-heart-rate-variability-view"
  role="img"
  aria-label="Heart Rate Variability"
  data-value=""
>
  <!-- Display: shows the vital sign value as text content -->
  <!-- Consumer sets data-value attribute and text content -->
</span>
