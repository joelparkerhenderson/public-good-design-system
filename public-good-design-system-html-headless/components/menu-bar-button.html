<!-- MenuBarButton component -->
<!--
  Description: one item in a menu bar
  HTML tag: <button>
  CSS class: menu-bar-button
  Keyboard: Tab to focus, Enter or Space to activate
  Accessibility: role="menuitem", Implicit button role, aria-label for accessible name
  Usage:
    <button class="menu-bar-button" role="menuitem" aria-label="Example">
      ...
    </button>
-->

<button
  class="menu-bar-button"
  role="menuitem"
  aria-label=""
>
  <!-- Consumer provides button content -->
</button>
