<!-- tel-link.html -->
<!-- TelLink component -->
<!--
  Description: a tel hyperlink for a telephone number
  HTML tag: <a>
  CSS class: tel-link
  Keyboard: Tab to focus, Enter to follow link
  Accessibility: aria-label for accessible name
  Usage:
    <a class="tel-link" aria-label="Example">
      ...
    </a>
-->

<a
  class="tel-link"
  aria-label=""
  href="tel:"
>
  <!-- Consumer provides link text -->
</a>
