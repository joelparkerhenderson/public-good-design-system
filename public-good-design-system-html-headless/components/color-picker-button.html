<!-- ColorPickerButton component -->
<!--
  Description: a button showing a color swatch in a color picker
  HTML tag: <button>
  CSS class: color-picker-button
  Keyboard: Tab to focus, Enter or Space to activate
  Accessibility: role="radio", Implicit button role, aria-label for accessible name
  Usage:
    <button class="color-picker-button" role="radio" aria-label="Example">
      ...
    </button>
-->

<button
  class="color-picker-button"
  role="radio"
  aria-label=""
>
  <!-- Consumer provides button content -->
</button>
