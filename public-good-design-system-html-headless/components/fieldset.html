<!-- fieldset.html -->
<!-- Fieldset component -->
<!--
  Description: a group of related form fields with a legend
  HTML tag: <fieldset>
  CSS class: fieldset
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <fieldset class="fieldset" aria-label="Example">
      ...
    </fieldset>
-->

<fieldset
  class="fieldset"
  aria-label=""
>
  <legend class="fieldset-legend"><!-- Consumer provides legend text --></legend>
  <!-- Consumer provides form fields -->
</fieldset>
