<!-- reset-input.html -->
<!-- ResetInput component -->
<!--
  Description: a button input that resets a form to default values
  HTML tag: <input>
  CSS class: reset-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Usage:
    <input class="reset-input" aria-label="Example">
      ...
    
-->

<input
  class="reset-input"
  type="reset"
  aria-label=""
>
