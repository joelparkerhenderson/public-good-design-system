<!-- VitalSignVo2MaxAsMlPerKgPerMinuteInput component -->
<!--
  Description: number input of one vital sign VO2 max in ml per kg per minute with integers
  HTML tag: <input>
  CSS class: vital-sign-vo2-max-as-ml-per-kg-per-minute-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Usage:
    <input class="vital-sign-vo2-max-as-ml-per-kg-per-minute-input" aria-label="Example">
      ...
    
-->

<input
  class="vital-sign-vo2-max-as-ml-per-kg-per-minute-input"
  type="number"
  min="0"
  max="100"
  step="1"
  aria-label="VO2 Max"
>
