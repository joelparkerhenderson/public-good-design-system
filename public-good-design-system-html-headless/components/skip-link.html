<!-- SkipLink component -->
<!--
  Description: a hidden link for keyboard users to skip to main content
  HTML tag: <a>
  CSS class: skip-link
  Keyboard: Tab to focus, Enter to follow link
  Accessibility: aria-label for accessible name
  Usage:
    <a class="skip-link" aria-label="Example">
      ...
    </a>
-->

<a
  class="skip-link"
  aria-label=""
  href=""
>
  <!-- Consumer provides link text -->
</a>
