<!-- vital-sign-body-temperature-as-celcius-view.html -->
<!-- VitalSignBodyTemperatureAsCelciusView component -->
<!--
  Description: number display of one vital sign body temperature in Celsius degrees with one decimal point
  HTML tag: <span>
  CSS class: vital-sign-body-temperature-as-celcius-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <span class="vital-sign-body-temperature-as-celcius-view" aria-label="Example">
      ...
    </span>
-->

<span
  class="vital-sign-body-temperature-as-celcius-view"
  role="img"
  aria-label="Body Temperature"
  data-value=""
>
  <!-- Display: shows the vital sign value as text content -->
  <!-- Consumer sets data-value attribute and text content -->
</span>
