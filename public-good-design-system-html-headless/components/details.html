<!-- Details component -->
<!--
  Description: a disclosure widget that shows and hides content
  HTML tag: <details>
  CSS class: details
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <details class="details" aria-label="Example">
      ...
    </details>
-->

<details
  class="details"
  aria-label=""
>
  <!-- Consumer provides content -->
</details>

<script>
  // Details behavior
  (function() {
    'use strict';
    // Details: consumer implements interactive behavior
    document.querySelectorAll('.details').forEach(function(el) {
      // Interactive behavior initialization
    });
  })();
</script>
