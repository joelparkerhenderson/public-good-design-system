<!-- vital-sign-height-as-cm-input.html -->
<!-- VitalSignHeightAsCmInput component -->
<!--
  Description: number input of one vital sign height in centimetres with integers
  HTML tag: <input>
  CSS class: vital-sign-height-as-cm-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Usage:
    <input class="vital-sign-height-as-cm-input" aria-label="Example">
      ...
    
-->

<input
  class="vital-sign-height-as-cm-input"
  type="number"
  min="20"
  max="300"
  step="1"
  aria-label="Height"
>
