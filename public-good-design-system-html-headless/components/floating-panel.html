<!-- FloatingPanel component -->
<!--
  Description: a panel that floats above page content
  HTML tag: <div>
  CSS class: floating-panel
  Keyboard: None (passive element)
  Accessibility: role="region", aria-label for accessible name
  Usage:
    <div class="floating-panel" role="region" aria-label="Example">
      ...
    </div>
-->

<div
  class="floating-panel"
  role="region"
  aria-label=""
>
  <!-- Consumer provides content -->
</div>
