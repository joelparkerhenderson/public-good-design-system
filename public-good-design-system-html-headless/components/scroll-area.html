<!-- ScrollArea component -->
<!--
  Description: a scrollable container with custom scrollbar support
  HTML tag: <div>
  CSS class: scroll-area
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <div class="scroll-area" aria-label="Example">
      ...
    </div>
-->

<div
  class="scroll-area"
  aria-label=""
>
  <!-- Consumer provides content -->
</div>

<script>
  // ScrollArea behavior
  (function() {
    'use strict';
    // ScrollArea: consumer implements interactive behavior
    document.querySelectorAll('.scroll-area').forEach(function(el) {
      // Interactive behavior initialization
    });
  })();
</script>
