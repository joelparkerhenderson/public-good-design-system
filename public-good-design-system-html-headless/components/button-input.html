<!-- ButtonInput component -->
<!--
  Description: an input element of type button for form actions
  HTML tag: <input>
  CSS class: button-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Usage:
    <input class="button-input" aria-label="Example">
      ...
    
-->

<input
  class="button-input"
  type="button"
  aria-label=""
>
