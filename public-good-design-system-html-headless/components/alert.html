<!-- Alert component -->
<!--
  Description: a status message for important information or feedback
  HTML tag: <div>
  CSS class: alert
  Keyboard: None (passive element)
  Accessibility: role="alert", aria-label for accessible name
  Usage:
    <div class="alert" role="alert" aria-label="Example">
      ...
    </div>
-->

<div
  class="alert"
  role="alert"
  aria-label=""
>
  <!-- Consumer provides content -->
</div>
