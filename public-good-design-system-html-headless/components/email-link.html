<!-- EmailLink component -->
<!--
  Description: a mailto hyperlink for an email address
  HTML tag: <a>
  CSS class: email-link
  Keyboard: Tab to focus, Enter to follow link
  Accessibility: aria-label for accessible name
  Usage:
    <a class="email-link" aria-label="Example">
      ...
    </a>
-->

<a
  class="email-link"
  aria-label=""
  href="mailto:"
>
  <!-- Consumer provides link text -->
</a>
