<!-- VitalSignVo2MaxAsMlPerKgPerMinuteView component -->
<!--
  Description: number display of one vital sign VO2 max in ml per kg per minute with integers
  HTML tag: <span>
  CSS class: vital-sign-vo2-max-as-ml-per-kg-per-minute-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <span class="vital-sign-vo2-max-as-ml-per-kg-per-minute-view" aria-label="Example">
      ...
    </span>
-->

<span
  class="vital-sign-vo2-max-as-ml-per-kg-per-minute-view"
  role="img"
  aria-label="VO2 Max"
  data-value=""
>
  <!-- Display: shows the vital sign value as text content -->
  <!-- Consumer sets data-value attribute and text content -->
</span>
