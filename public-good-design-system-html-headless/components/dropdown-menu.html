<!-- DropdownMenu component -->
<!--
  Description: a menu that opens below a trigger button
  HTML tag: <div>
  CSS class: dropdown-menu
  Keyboard: None (passive element)
  Accessibility: role="menu", aria-label for accessible name
  Usage:
    <div class="dropdown-menu" role="menu" aria-label="Example">
      ...
    </div>
-->

<div
  class="dropdown-menu"
  role="menu"
  aria-label=""
>
  <!-- Consumer provides content -->
</div>

<script>
  // DropdownMenu behavior
  (function() {
    'use strict';
    // DropdownMenu: consumer implements interactive behavior
    document.querySelectorAll('.dropdown-menu').forEach(function(el) {
      // Interactive behavior initialization
    });
  })();
</script>
