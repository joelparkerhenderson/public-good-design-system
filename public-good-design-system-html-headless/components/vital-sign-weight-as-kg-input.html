<!-- vital-sign-weight-as-kg-input.html -->
<!-- VitalSignWeightAsKgInput component -->
<!--
  Description: number input of one vital sign weight in kilograms with integers
  HTML tag: <input>
  CSS class: vital-sign-weight-as-kg-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Usage:
    <input class="vital-sign-weight-as-kg-input" aria-label="Example">
      ...
    
-->

<input
  class="vital-sign-weight-as-kg-input"
  type="number"
  min="0"
  max="700"
  step="1"
  aria-label="Weight"
>
