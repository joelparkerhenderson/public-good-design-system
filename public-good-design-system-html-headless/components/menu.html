<!-- Menu component -->
<!--
  Description: a list of actions or options triggered by a button
  HTML tag: <div>
  CSS class: menu
  Keyboard: None (passive element)
  Accessibility: role="menu", aria-label for accessible name
  Usage:
    <div class="menu" role="menu" aria-label="Example">
      ...
    </div>
-->

<div
  class="menu"
  role="menu"
  aria-label=""
>
  <!-- Consumer provides content -->
</div>

<script>
  // Menu behavior
  (function() {
    'use strict';
    // Menu: consumer implements interactive behavior
    document.querySelectorAll('.menu').forEach(function(el) {
      // Interactive behavior initialization
    });
  })();
</script>
