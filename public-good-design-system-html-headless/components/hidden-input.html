<!-- hidden-input.html -->
<!-- HiddenInput component -->
<!--
  Description: a hidden input for including data in form submission
  HTML tag: <input>
  CSS class: hidden-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Usage:
    <input class="hidden-input" aria-label="Example">
      ...
    
-->

<input
  class="hidden-input"
  type="hidden"
>
