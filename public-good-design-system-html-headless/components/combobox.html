<!-- Combobox component -->
<!--
  Description: a text input combined with a dropdown list for filtering options
  HTML tag: <div>
  CSS class: combobox
  Keyboard: Tab to focus, Arrow Down to open list, type to filter, Enter to select, Escape to close
  Accessibility: role="combobox", aria-label for accessible name
  Usage:
    <div class="combobox" role="combobox" aria-label="Example">
      ...
    </div>
-->

<div
  class="combobox"
  role="combobox"
  aria-label=""
>
  <!-- Consumer provides content -->
</div>

<script>
  // Combobox behavior
  (function() {
    'use strict';
    // Combobox: consumer implements interactive behavior
    document.querySelectorAll('.combobox').forEach(function(el) {
      // Interactive behavior initialization
    });
  })();
</script>
