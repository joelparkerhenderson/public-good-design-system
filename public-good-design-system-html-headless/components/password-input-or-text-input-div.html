<!-- password-input-or-text-input-div.html -->
<!-- PasswordInputOrTextInputDiv component -->
<!--
  Description: an input for entering a password or text with show/hide toggle
  HTML tag: <div>
  CSS class: password-input-or-text-input-div
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <div class="password-input-or-text-input-div" aria-label="Example">
      ...
    </div>
-->

<div
  class="password-input-or-text-input-div"
  aria-label=""
>
  <!-- Consumer provides content -->
</div>

<script>
  // PasswordInputOrTextInputDiv behavior
  (function() {
    'use strict';
    document.querySelectorAll('.password-input-or-text-input-div').forEach(function(el) {
      var input = el.querySelector('input');
      var toggle = el.querySelector('[data-toggle]');
      if (input && toggle) {
        toggle.addEventListener('click', function() {
          var isPassword = input.type === 'password';
          input.type = isPassword ? 'text' : 'password';
          toggle.setAttribute('aria-pressed', String(isPassword));
        });
      }
    });
  })();
</script>
