<!-- RangeInput component -->
<!--
  Description: a slider input for selecting a value within a range
  HTML tag: <input>
  CSS class: range-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Usage:
    <input class="range-input" aria-label="Example">
      ...
    
-->

<input
  class="range-input"
  type="range"
  aria-label=""
>
