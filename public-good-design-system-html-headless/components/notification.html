<!-- Notification component -->
<!--
  Description: a brief message about an event or update
  HTML tag: <div>
  CSS class: notification
  Keyboard: None (passive element)
  Accessibility: role="alert", aria-label for accessible name
  Usage:
    <div class="notification" role="alert" aria-label="Example">
      ...
    </div>
-->

<div
  class="notification"
  role="alert"
  aria-label=""
>
  <!-- Consumer provides content -->
</div>
