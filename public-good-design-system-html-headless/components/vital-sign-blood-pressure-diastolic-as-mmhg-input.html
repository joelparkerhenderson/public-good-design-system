<!-- VitalSignBloodPressureDiastolicAsMmhgInput component -->
<!--
  Description: number input of one vital sign blood pressure diastolic with integers
  HTML tag: <input>
  CSS class: vital-sign-blood-pressure-diastolic-as-mmhg-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Usage:
    <input class="vital-sign-blood-pressure-diastolic-as-mmhg-input" aria-label="Example">
      ...
    
-->

<input
  class="vital-sign-blood-pressure-diastolic-as-mmhg-input"
  type="number"
  min="20"
  max="200"
  step="1"
  aria-label="Blood Pressure Diastolic"
>
