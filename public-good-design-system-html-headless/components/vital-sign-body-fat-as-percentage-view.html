<!-- VitalSignBodyFatAsPercentageView component -->
<!--
  Description: number display of one vital sign body fat percentage with one decimal point
  HTML tag: <span>
  CSS class: vital-sign-body-fat-as-percentage-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <span class="vital-sign-body-fat-as-percentage-view" aria-label="Example">
      ...
    </span>
-->

<span
  class="vital-sign-body-fat-as-percentage-view"
  role="img"
  aria-label="Body Fat Percentage"
  data-value=""
>
  <!-- Display: shows the vital sign value as text content -->
  <!-- Consumer sets data-value attribute and text content -->
</span>
