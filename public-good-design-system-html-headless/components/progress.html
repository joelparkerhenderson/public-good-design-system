<!-- Progress component -->
<!--
  Description: a horizontal progress bar showing completion
  HTML tag: <progress>
  CSS class: progress
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <progress class="progress" aria-label="Example">
      ...
    </progress>
-->

<progress
  class="progress"
  aria-label=""
  max="100"
  value="0"
>
  <!-- Consumer provides fallback text -->
</progress>
