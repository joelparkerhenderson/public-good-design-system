<!-- VitalSignSleepScoreAs0To100View component -->
<!--
  Description: number display of one vital sign sleep score with range 0-100
  HTML tag: <span>
  CSS class: vital-sign-sleep-score-as-0-to-100-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <span class="vital-sign-sleep-score-as-0-to-100-view" aria-label="Example">
      ...
    </span>
-->

<span
  class="vital-sign-sleep-score-as-0-to-100-view"
  role="img"
  aria-label="Sleep Score"
  data-value=""
>
  <!-- Display: shows the vital sign value as text content -->
  <!-- Consumer sets data-value attribute and text content -->
</span>
