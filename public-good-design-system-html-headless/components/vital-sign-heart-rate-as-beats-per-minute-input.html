<!-- VitalSignHeartRateAsBeatsPerMinuteInput component -->
<!--
  Description: number input of one vital sign heart rate in beats per minute with integers
  HTML tag: <input>
  CSS class: vital-sign-heart-rate-as-beats-per-minute-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Usage:
    <input class="vital-sign-heart-rate-as-beats-per-minute-input" aria-label="Example">
      ...
    
-->

<input
  class="vital-sign-heart-rate-as-beats-per-minute-input"
  type="number"
  min="20"
  max="300"
  step="1"
  aria-label="Heart Rate"
>
