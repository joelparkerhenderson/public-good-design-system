<!-- checkbox-input.html -->
<!-- CheckboxInput component -->
<!--
  Description: a checkbox input for toggling a boolean value
  HTML tag: <input>
  CSS class: checkbox-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Usage:
    <input class="checkbox-input" aria-label="Example">
      ...
    
-->

<input
  class="checkbox-input"
  type="checkbox"
  aria-label=""
>
