<!-- EditableForm component -->
<!--
  Description: a form wrapper for inline editing of content
  HTML tag: <form>
  CSS class: editable-form
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <form class="editable-form" aria-label="Example">
      ...
    </form>
-->

<form
  class="editable-form"
  aria-label=""
>
  <!-- Consumer provides form fields -->
</form>

<script>
  // EditableForm behavior
  (function() {
    'use strict';
    // EditableForm: consumer implements interactive behavior
    document.querySelectorAll('.editable-form').forEach(function(el) {
      // Interactive behavior initialization
    });
  })();
</script>
