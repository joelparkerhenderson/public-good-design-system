<!-- VitalSignWeightAsKgView component -->
<!--
  Description: number display of one vital sign weight in kilograms with integers
  HTML tag: <span>
  CSS class: vital-sign-weight-as-kg-view
  Keyboard: None (passive element)
  Accessibility: aria-label for accessible name
  Usage:
    <span class="vital-sign-weight-as-kg-view" aria-label="Example">
      ...
    </span>
-->

<span
  class="vital-sign-weight-as-kg-view"
  role="img"
  aria-label="Weight"
  data-value=""
>
  <!-- Display: shows the vital sign value as text content -->
  <!-- Consumer sets data-value attribute and text content -->
</span>
