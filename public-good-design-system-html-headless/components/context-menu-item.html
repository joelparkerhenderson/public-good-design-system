  Description: one item in a context menu
  HTML tag: <div>
  CSS class: context-menu-item

  Accessibility: role="menuitem", aria-label for accessible name
  Usage:
    <div class="context-menu-item" role="menuitem" aria-label="Example">
      ...
    </div>
-->

  role="menuitem"
  aria-label=""

</div>
