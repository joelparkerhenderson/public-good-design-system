<!-- toggle-button.html -->
<!-- ToggleButton component -->
<!--
  Description: a button that toggles between pressed and unpressed states
  HTML tag: <button>
  CSS class: toggle-button
  Keyboard: Tab to focus, Enter or Space to activate
  Accessibility: Implicit button role, aria-label for accessible name, aria-pressed for toggle state
  Usage:
    <button class="toggle-button" aria-label="Example">
      ...
    </button>
-->

<button
  class="toggle-button"
  aria-label=""
  aria-pressed="false"
>
  <!-- Consumer provides button content -->
</button>

<script>
  // ToggleButton behavior
  (function() {
    'use strict';
    document.querySelectorAll('.toggle-button').forEach(function(el) {
      el.addEventListener('click', function() {
        var pressed = el.getAttribute('aria-pressed') === 'true';
        el.setAttribute('aria-pressed', String(!pressed));
      });
    });
  })();
</script>
