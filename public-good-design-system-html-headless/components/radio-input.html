<!-- RadioInput component -->
<!--
  Description: a single radio button input
  HTML tag: <input>
  CSS class: radio-input
  Keyboard: Tab to focus, standard input keyboard interactions
  Accessibility: Implicit input role, aria-label for accessible name
  Usage:
    <input class="radio-input" aria-label="Example">
      ...
    
-->

<input
  class="radio-input"
  type="radio"
  aria-label=""
>
